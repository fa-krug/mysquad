<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Foreground figure gradient (cyan/bright blue) -->
    <linearGradient id="frontFig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38d4f8"/>
      <stop offset="100%" stop-color="#2896e0"/>
    </linearGradient>
    <!-- Subtle glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Front-center small figure -->
  <g filter="url(#glow)">
    <!-- Head -->
    <circle cx="512" cy="530" r="48" fill="url(#frontFig)"/>
    <!-- Body -->
    <ellipse cx="512" cy="700" rx="90" ry="105" fill="url(#frontFig)"/>
  </g>
</svg>
