name: Release

on:
  push:
    branches:
      - main

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check formatting
        if: runner.os == 'macOS'
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check Rust formatting
        if: runner.os == 'macOS'
        run: cd src-tauri && cargo fmt -- --check

      - name: Clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Rust tests
        run: cd src-tauri && cargo test

  build:
    name: Build (${{ matrix.os }})
    needs: checks
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: dmg
          - os: windows-latest
            artifact: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Inject macOS icon
        if: runner.os == 'macOS'
        run: bash src-tauri/scripts/inject-icon.sh

      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f | head -50

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/${{ matrix.artifact }}/

      - name: Upload updater artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: updater-macos
          path: |
            src-tauri/target/release/bundle/macos/*.sig
            src-tauri/target/release/bundle/dmg/*.sig

      - name: Upload updater artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: updater-windows
          path: src-tauri/target/release/bundle/nsis/*.sig

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: dmg
          path: src-tauri/target/release/bundle/dmg/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: nsis
          path: src-tauri/target/release/bundle/nsis/

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
